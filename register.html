<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Register for HStats." />
    <link rel="stylesheet" href="/src/style.css" />
    <title>HStats | Register</title>
  </head>
  <body>
    <div class="page">
      <div class="backdrop"></div>
      <header class="site-header">
        <nav class="nav">
          <a class="brand-link" href="/index.html">
            <div class="brand-mark">Logo</div>
            <div class="brand-name">HStats</div>
          </a>
          <div class="nav-links">
            <a href="/index.html">Overview</a>
            <a href="/mods.html">Mods</a>
            <a href="/stats.html">Overall Stats</a>
            <a href="/documentation.html">Documentation</a>
          </div>
          <div class="nav-actions">
            <a class="ghost-button" href="/register.html">Register / Login</a>
          </div>
        </nav>
      </header>

      <main class="auth-center">
        <div class="auth-card">
          <h1>Register</h1>
          <p class="lead">Create an account to add your mod and view stats.</p>
          <form class="form-stack">
            <div class="form-field">
              <label for="register-email">Email</label>
              <input id="register-email" type="email" placeholder="you@example.com" />
            </div>
            <div class="form-field">
              <label for="register-password">Password</label>
              <input id="register-password" type="password" placeholder="Create a password" />
            </div>
            <div class="form-actions">
              <button class="primary-button" type="button">Create account</button>
              <a class="ghost-button" href="/login.html">Login</a>
            </div>
          </form>
        </div>
      </main>

      <footer class="footer">
        <div>
          <div class="brand-name">HStats</div>
          <p class="muted">Free stats for Hytale mods. Metrics shown are placeholders.</p>
        </div>
        <div class="footer-links">
          <a href="/index.html">Overview</a>
          <a href="/mods.html">Mods</a>
          <a href="/stats.html">Overall Stats</a>
          <a href="/documentation.html">Documentation</a>
          <a href="/register.html">Register / Login</a>
        </div>
      </footer>
    </div>

    <script src="/src/api.js"></script>
    <script src="/src/numbers.js"></script>
    <script src="/src/register.js"></script>
  </body>
</html>
